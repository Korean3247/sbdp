dataset: agnews
model: distilbert
num_classes: 4
max_length: 128
tokenizer: distilbert-base-uncased
epochs: 5
batch_size: 64
lr: 2.0e-5
optimizer: adamw
weight_decay: 0.01
scheduler: linear_warmup
warmup_scheduler_epochs: 1
num_workers: 2
pruning:
  mode: calibrated_topk_loss
  enabled: true
  warmup_epochs: 2
  interval_epochs: 2
  retention_ratio: 0.5
  score_type: loss
  local_window: 2
  ema_alpha: 0.8
seed: 0
output_dir: outputs
