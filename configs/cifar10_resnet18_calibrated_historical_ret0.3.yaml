dataset: cifar10
model: resnet18
num_classes: 10
data_dir: ./data
epochs: 100
batch_size: 128
lr: 0.1
momentum: 0.9
weight_decay: 5.0e-4
scheduler: multistep
num_workers: 2
pruning:
  mode: calibrated_historical
  enabled: true
  warmup_epochs: 10
  interval_epochs: 5
  retention_ratio: 0.3
  score_type: loss
  local_window: 2
  ema_alpha: 0.8
  historical_beta: 0.1
  historical_lambda_c: 0.01
seed: 0
output_dir: outputs
